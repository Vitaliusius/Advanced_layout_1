<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" href="style/css/font-awesome.min.css">
  <title>Пример подключения плеера</title>
  <meta charset="utf-8">
  <style type="text/css">
    button {
      background-color:black;
      border-style:none;
      cursor:pointer;
      color:white;
      width: 20px;
      height: 15px;
      font-size: 120%;
      }
    div.js-video-container {
      width: 100%;
      height: 100%;
      }
    div.bottons-container {
      background-color:black;
      flex-grow: 999
      }
    div.player {
      display: flex;
      flex-direction:column;
    }
  </style>
</head>
<body>
  <div class="player" id="player" style="width: 800px; height: 600px; box-shadow: 0 0 10px rgba(0,0,0,10);">
    <div class="js-video-container"></div>
    <!-- Here can be placed player controls: play and volume buttons -->
    <div class="bottons-container">
      <button class="js-play-button">
        <i class="fa fa-play" aria-hidden="true"></i>
      </button>
      <button class="js-pause-button">
        <i class="fa fa-pause" aria-hidden="true"></i>
      </button>
      <button class="js-mute-button">
        <i class="fa fa-volume-up" aria-hidden="true"></i>
      </button>
      <button class="js-volume-button">
        <i class="fa fa-volume-off" aria-hidden="true"></i>
      </button>
    </div>
  <script src="https://code.jquery.com/jquery-3.4.1.min.js"></script>
  <script src="https://unpkg.com/playable@2.10.3/dist/statics/playable.bundle.min.js"></script>
  <script src="player.js"></script>

  <script type="text/javascript">
    createPlayer({
      elementId: 'player',
      src: 'https://dvmn.org/media/filer_public/78/db/78db3456-3fd3-4504-9ed9-d2d1fd843c0b/highest_peak.mp4',
    });
  </script>
</body>
</html>
