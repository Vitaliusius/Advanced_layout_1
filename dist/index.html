<!DOCTYPE html>
<html>
<head>
  <link href="https://fonts.googleapis.com/css2?family=Google+Sans+Flex:opsz,wght@6..144,1..1000&family=Roboto+Slab:wght@100..900&display=swap" rel="stylesheet">
  <link rel="icon" href="favicon.png" type="image/png">
  <link rel="stylesheet" href="styles/css/font-awesome.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/normalize/8.0.1/normalize.min.css">
  <title>Видеоплеер для ГОСТФильм</title>
  <meta charset="utf-8">
  <style type="text/css">
    .input:focus {
      color:white;
    }
    .player-button {
      background-color:transparent;
      border-style: none;
      cursor: pointer;
      color: white;
      margin-right: 3.5pt;
      margin-left: 1.5pt;
      width: 30px;
      height: 44px;      
      font-size: 15pt;
      padding: 2pt;
      border: 2pt;
      }
    .js-video-container {
      flex-grow: 1;
      }
    .bottons-container {
      margin-left: 1pt;
      display: flex; 
      flex-direction: row;    
      background-color: black;
      }
    .player {
      flex-direction: column;
      background-color: black;
      display: flex;
      width: 800px;
      height: 600px;
      box-shadow: 0 0 10px rgba(0,0,0,10);    
      }
    .between-the-buttons {
      display: flex;
      flex-direction: row;
      background-color: black;
      flex-grow: 1;
      font-family: "Roboto Slab", serif;
      margin: 10px 0px 4px;
      }
    .js-current-time {
      font-size:16px;
      margin-top: 2px;
      color: white;
      width: 50px;
      }
    .js-duration {
      font-size:16px;
      margin-top: 2.5px;
      margin-right: 4px;
      color: white;
      width: 50px;
      }
    .js-progress {
      display: flex;
      flex-direction: row;
      flex-grow: 1;
      }
    .js-progress:hover .dot {
      opacity: 0;    
      transition-property: opacity;
      transition-duration: 300ms;
      transition-timing-function: ease-out, ease-in;
      }
    .js-progress-slider {
      height: 5px;
      margin-top: 10px;
      margin-left: 12px;
      display: flex;
      flex-direction: row;
      border-radius: 10px;
      background-color: #f8104d;
      }
    .dot {
      opacity:1;
      transition-property: opacity;
      transition-duration: 300ms;
      transition-timing-function: ease-out, ease-in;
      margin-top: 5px;      
      color: white ;
      height: 8px;
      width: 8px;
      background-color: #f8104d;
      border-style: solid;
      border-width: 3px;
      border-color: white;
      border-radius: 25px;
      }

  </style>
</head>
<body>
  <div class="player" id="player">
    <div class="js-video-container"></div>
    <!-- Here can be placed player controls: play and volume buttons -->

    <div class="bottons-container">
      <button class="js-play-button player-button">
        <i class="fa fa-play fa-xl" aria-hidden="true"></i>
      </button>
      <button class="js-pause-button player-button">
        <i class="fa fa-pause" aria-hidden="true"></i>
      </button>
      <button class="js-mute-button player-button">
        <i class="fa fa-volume-up" aria-hidden="true"></i>
      </button>
      <button class="js-volume-button player-button">
        <i class="fa fa-volume-off" aria-hidden="true"></i>
      </button>
        <div class="between-the-buttons">
          <span class="js-current-time"></span>
          <div class="js-progress">           
            <div class="js-progress-slider"></div>
            <span class="dot"></span>
          </div>
          <span class="js-duration"></span>
        </div>
      <button class="js-fullscreen-button player-button">
        <i class="fa fa-expand" aria-hidden="true"></i>
      </button>
    </div>
  <script src="https://code.jquery.com/jquery-3.4.1.min.js"></script>
  <script src="https://unpkg.com/playable@2.10.3/dist/statics/playable.bundle.min.js"></script>
  <script src="player.js"></script>

  <script type="text/javascript">
    createPlayer({
      elementId: "player",
      src: "https://dvmn.org/media/filer_public/78/db/78db3456-3fd3-4504-9ed9-d2d1fd843c0b/highest_peak.mp4",
    });
  </script>
</body>
</html>
