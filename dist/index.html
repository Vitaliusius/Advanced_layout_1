<!DOCTYPE html>
<html>
<head>
  <link href="https://fonts.googleapis.com/css2?family=Google+Sans+Flex:opsz,wght@6..144,1..1000&family=Roboto+Slab:wght@100..900&display=swap" rel="stylesheet">
  <link rel="icon" href="favicon.png" type="image/png">
  <link rel="stylesheet" href="styles/css/font-awesome.min.css">
  <title>Видеоплеер</title>
  <meta charset="utf-8">
  <style type="text/css">
    .player-button {
      background-color:transparent;
      border-style:none;
      cursor:pointer;
      color:white;
      margin-right:4pt;
      margin-left:2pt;
      width: 30px;
      height: 44px;      
      font-size: 15pt;
      padding:2pt;
      border: 2pt;
      }
    .js-video-container {
      flex-grow: 1;
      }
    .bottons-container {
      display: flex; 
      flex-direction:row;    
      background-color:black;
      }
    .player {
      flex-direction:column;
      background-color:black;
      display: flex;
      width: 800px;
      height: 600px;
      box-shadow: 0 0 10px rgba(0,0,0,10);    
    }
    .between-the-buttons {
      display: flex;
      flex-direction: row;
      background-color: black;
      flex-grow: 1;
      font-family: "Roboto Slab", serif;
    }
    .js-current-time {
      color: white;

    }
    .js-duration {
      color: white;
    }
    .js-progress {

      flex-grow: 1;

    }
  </style>
</head>
<body>
  <div class="player" id="player">
    <div class="js-video-container"></div>
    <!-- Here can be placed player controls: play and volume buttons -->

    <div class="bottons-container">
      <button class="js-play-button player-button">
        <i class="fa fa-play fa-xl" aria-hidden="true"></i>
      </button>
      <button class="js-pause-button player-button">
        <i class="fa fa-pause" aria-hidden="true"></i>
      </button>
      <button class="js-mute-button player-button">
        <i class="fa fa-volume-up" aria-hidden="true"></i>
      </button>
      <button class="js-volume-button player-button">
        <i class="fa fa-volume-off" aria-hidden="true"></i>
      </button>

        <div class="between-the-buttons">
          <span class="js-current-time"></span>
          <div class="js-progress">           
           
          </div>
          <span class="js-duration"></span>
        </div>

      <button class="js-fullscreen-button player-button">
        <i class="fa fa-arrows-alt" aria-hidden="true"></i>
      </button>
    </div>
  <script src="https://code.jquery.com/jquery-3.4.1.min.js"></script>
  <script src="https://unpkg.com/playable@2.10.3/dist/statics/playable.bundle.min.js"></script>
  <script src="player.js"></script>

  <script type="text/javascript">
    createPlayer({
      elementId: "player",
      src: "https://dvmn.org/media/filer_public/78/db/78db3456-3fd3-4504-9ed9-d2d1fd843c0b/highest_peak.mp4",
    });
  </script>
</body>
</html>
